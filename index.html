<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍝堝笇绫诲瀷璇嗗埆鍣?/title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px;min-height:100vh}
.container{max-width:650px;margin:0 auto}
h1{text-align:center;color:#333;margin-bottom:24px;font-size:22px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:24px;margin-bottom:16px}
label{display:block;font-weight:600;margin-bottom:6px;color:#555;font-size:14px}
input[type="text"]{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px;box-sizing:border-box;font-family:monospace}
.btn{background:#007bff;color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-size:14px;margin-top:8px}
.btn:hover{background:#0056b3}
.btn-green{background:#28a745}
.btn-green:hover{background:#218838}
.result{margin-top:16px}
.hash-type{padding:12px;border-radius:6px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.hash-type .confidence{font-size:12px;padding:3px 8px;border-radius:12px;font-weight:600}
.high{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.medium{background:#fff3cd;color:#856404;border:1px solid #ffeaa7}
.low{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.hash-type .name{font-weight:600;font-size:15px}
.hash-type .desc{font-size:13px;color:#666;margin-top:2px}
.not-found{text-align:center;padding:20px;color:#999;font-size:15px}
</style>
</head>
<body>
<div class="container">
<h1>鍝堝笇绫诲瀷璇嗗埆鍣?/h1>
<div class="card">
<label>杈撳叆鍝堝笇鍊?/label>
<input type="text" id="hashInput" placeholder="杈撳叆瑕佽瘑鍒殑鍝堝笇鍊硷紙MD5, SHA1, SHA256绛夛級">
<button class="btn" onclick="identify()">璇嗗埆鍝堝笇绫诲瀷</button>
<div class="result" id="result"></div>
</div>
</div>
<script>
const hashTypes=[
{name:'MD5',length:32,chars:'hex',desc:'128浣嶅搱甯屽€硷紝甯哥敤浜庢牎楠屾枃浠跺畬鏁存€?},
{name:'SHA-1',length:40,chars:'hex',desc:'160浣嶅搱甯屽€硷紝宸茶鍙戠幇瀛樺湪纰版挒婕忔礊'},
{name:'SHA-224',length:56,chars:'hex',desc:'224浣峉HA-2绯诲垪鍝堝笇鍊?},
{name:'SHA-256',length:64,chars:'hex',desc:'256浣峉HA-2绯诲垪鍝堝笇鍊硷紝鐩墠鏈€甯哥敤'},
{name:'SHA-384',length:96,chars:'hex',desc:'384浣峉HA-2绯诲垪鍝堝笇鍊?},
{name:'SHA-512',length:128,chars:'hex',desc:'512浣峉HA-2绯诲垪鍝堝笇鍊?},
{name:'SHA3-224',length:56,chars:'hex',desc:'224浣峉HA-3绯诲垪鍝堝笇鍊?},
{name:'SHA3-256',length:64,chars:'hex',desc:'256浣峉HA-3绯诲垪鍝堝笇鍊?},
{name:'SHA3-384',length:96,chars:'hex',desc:'384浣峉HA-3绯诲垪鍝堝笇鍊?},
{name:'SHA3-512',length:128,chars:'hex',desc:'512浣峉HA-3绯诲垪鍝堝笇鍊?},
{name:'BLAKE2s',length:64,chars:'hex',desc:'256浣岯LAKE2s鍝堝笇鍊?},
{name:'BLAKE2b',length:128,chars:'hex',desc:'512浣岯LAKE2b鍝堝笇鍊?},
{name:'RIPEMD-160',length:40,chars:'hex',desc:'160浣峈IPEMD鍝堝笇鍊?},
{name:'NTLM',length:32,chars:'hex',desc:'Windows NTLM瀵嗙爜鍝堝笇'},
{name:'MySQL4',length:16,chars:'hex',desc:'MySQL 4.1涔嬪墠鐗堟湰瀵嗙爜鍝堝笇'},
{name:'CRC32',length:8,chars:'hex',desc:'32浣嶅惊鐜啑浣欐牎楠?},
{name:'Adler-32',length:8,chars:'dec',desc:'32浣嶆牎楠屽拰绠楁硶'},
{name:'Base64',length:0,chars:'base64',desc:'Base64缂栫爜瀛楃涓诧紙闈炲搱甯岋級'},
{name:'Base32',length:0,chars:'base32',desc:'Base32缂栫爜瀛楃涓诧紙闈炲搱甯岋級'},
];
function identify(){
const input=document.getElementById('hashInput').value.trim();
if(!input){document.getElementById('result').innerHTML='<div class="not-found">璇疯緭鍏ュ搱甯屽€?/div>';return}
const results=[];
const len=input.length;
const isHex=/^[0-9a-fA-F]+$/.test(input);
const isBase64=/^[A-Za-z0-9+/]+=*$/.test(input)&&len%4===0;
const isBase32=/^[A-Z2-7]+=*$/.test(input);
hashTypes.forEach(ht=>{
let score=0;
if(ht.chars==='hex'&&isHex&&ht.length===len)score=95;
else if(ht.chars==='base64'&&isBase64)score=70;
else if(ht.chars==='base32'&&isBase32)score=70;
else if(ht.chars==='hex'&&isHex&&len%2===0){
const diff=Math.abs(ht.length-len);
if(diff===0)score=95;
else if(diff<=4)score=40;
else if(diff<=8)score=20;
}
if(score>0)results.push({...ht,score});
});
results.sort((a,b)=>b.score-a.score);
const div=document.getElementById('result');
if(!results.length){div.innerHTML='<div class="not-found">鏈兘璇嗗埆璇ュ搱甯岀被鍨?/div>';return}
div.innerHTML=results.map(r=>{
const cls=r.score>=80?'high':r.score>=50?'medium':'low';
const label=r.score>=80?'楂樼疆淇″害':r.score>=50?'涓瓑缃俊搴?:'浣庣疆淇″害';
return `<div class="hash-type"><span class="confidence ${cls}">${label} ${r.score}%</span><div><div class="name">${r.name}</div><div class="desc">${r.desc}</div></div></div>`;
}).join('');
}
document.getElementById('hashInput').addEventListener('keydown',e=>{if(e.key==='Enter')identify()});
</script>
</body>
</html>
